name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "proto/**"
  pull_request:
    paths:
      - "backend/**"
      - "proto/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trendbird_test
          POSTGRES_DB: trendbird_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trendbird_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://trendbird_test@localhost:5432/trendbird_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run migrations
        run: |
          for f in backend/migrations/*.up.sql; do
            echo "Running: $f"
            psql "$TEST_DATABASE_URL" -f "$f"
          done

      - name: Run tests
        working-directory: backend
        run: go test ./... -race -count=1
